site:
  name: Tache Technology
  site: 'https://tachetech.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: 'Tache Technology | Software a medida, páginas web y automatización en Montería'
    template: '%s | Tache Technology'
  description: 'Creamos software a medida, páginas web profesionales y automatización para empresas en Montería, Córdoba y Colombia. Agenda una asesoría gratis.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Tache Technology
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@tachetech'
    site: '@tachetech'
    cardType: summary_large_image

i18n:
  language: es
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/blog/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'light:only'

  tokens:
    default:
      fonts:
        sans: InterVariable
        serif: InterVariable
        heading: InterVariable
      colors:
        default: rgb(17 24 39) # text-main #111827
        heading: rgb(17 24 39)
        muted: rgb(75 85 99) # text-secondary #4B5563
        bgPage: rgb(255 255 255) # background
        primary: rgb(29 12 223) # #1D0CDF — azul base de marca
        secondary: rgb(23 9 184) # #1709B8 — primary hover
        accent: rgb(238 240 255) # #EEF0FF — primary light
    dark:
      fonts: {}
      colors:
        default: rgb(17 24 39)
        heading: rgb(17 24 39)
        muted: rgb(75 85 99)
        bgPage: rgb(255 255 255)
        primary: rgb(29 12 223)
        secondary: rgb(23 9 184)
        accent: rgb(238 240 255)
