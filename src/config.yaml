site:
  name: Tache technology
  site: 'https://tachetech.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: Tachetechnology
    template: '%s — Tachetechnology'
  description: 'Tache Technology — Desarrollo de software a medida, automatización con IA, integraciones y cloud para impulsar tu negocio.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Tache Technology
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@tachetech'
    site: '@tachetech'
    cardType: summary_large_image

i18n:
  language: es
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"

  tokens:
    default:
      fonts:
        sans: InterVariable
        serif: InterVariable
        heading: InterVariable
      colors:
        default: rgb(15 23 42) # slate-900
        heading: rgb(7 11 20)
        muted: rgb(71 85 105 / 90%) # slate-600
        bgPage: rgb(248 250 252) # slate-50
        primary: rgb(29 12 223) # #1D0CDF — azul base de marca
        secondary: rgb(37 99 235) # #2563EB — azul brillante (sustituye al violeta)
        accent: rgb(34 211 238) # #22D3EE — cian de acento
    dark:
      fonts: {}
      colors:
        default: rgb(226 232 240) # slate-200
        heading: rgb(248 250 252) # slate-50
        muted: rgb(148 163 184 / 90%) # slate-400
        bgPage: rgb(7 11 20) # #070B14
        primary: rgb(99 102 241) # indigo-500 — más brillante sobre dark
        secondary: rgb(59 130 246) # blue-500
        accent: rgb(34 211 238) # cyan-400
